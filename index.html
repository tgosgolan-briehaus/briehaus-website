<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brie Haus Bakery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #F7F1E8;
  color: #5A3E2B;
}

/* HEADER */
header {
  background: #5A3E2B;
  color: white;
  text-align: center;
  padding: 40px;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
  background: #5A3E2B;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

<!-- CART -->
<div class="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>
Total: ₱<span id="total">0</span>
</h3>


<div class="checkout">

<a id="checkoutBtn"
href="https://m.me/61590094065747"
target="_blank">

Checkout via Messenger

</a>

</div>


</div>

<script>
let cart = [];

function addItem(name, price) {
  cart.push({name, price});
  renderCart();
}

function removeItem(index) {
  cart.splice(index,1);
  renderCart();
}

function renderCart() {
  let cartDiv = document.getElementById("cartItems");
  let total = 0;
  cartDiv.innerHTML = "";

  cart.forEach((item, index) => {
    total += item.price;
    cartDiv.innerHTML += `
      <div class="item">
        ${item.name} - ₱${item.price}
        <span class="remove" onclick="removeItem(${index})">X</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;

  let message = encodeURIComponent(
    "Hello Brie Haus! I want to order:\n" +
    cart.map(i => "- " + i.name + " ₱" + i.price).join("\n") +
    "\nTotal: ₱" + total
  );

  document.getElementById("checkoutBtn").href =
"https://m.me/61590094065747?ref=" + message;
    
</script>

</body>
</html>
