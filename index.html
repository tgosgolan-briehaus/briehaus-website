<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brie Haus Bake Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F7F1E8;
      color: #5A3E2B;
    }

    .card {
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
}

button:hover {
  transform: scale(1.05);
}

.products {
  padding: 40px 20px;
}

    header {
      background: #5A3E2B;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 30px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    button {
      background: #5A3E2B;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .cart {
      background: white;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      border-radius: 15px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .remove {
      color: red;
      cursor: pointer;
    }

    .checkout {
      text-align: center;
      margin-top: 20px;
    }

    .checkout a {
      background: #C79A5D;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
    }
.coffee-section {
  background: linear-gradient(135deg, #ffffff, #fff7ed);
  max-width: 1000px;
  margin: 60px auto;
  padding: 40px 20px;
  border-radius: 25px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.10);
  border-top: 4px solid #C79A5D;
}

.coffee-section h2 {
  text-align: center;
  font-size: 30px;
  margin-bottom: 25px;
}
  
  </style>
</head>

<body>

<header>
  <h1>Brie Haus Bakery</h1>
  <p>Freshly Baked, Made with Heart</p>
</header>

<div class="products">

  <div class="card">
    <h3>🥔 Potato Ensaymada</h3>
    <p>₱45</p>
    <button onclick="addItem('Potato Ensaymada',45)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>☕ Coffee Bun</h3>
    <p>₱40</p>
    <button onclick="addItem('Coffee Bun',40)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>🌸 Spring in the City</h3>
    <p>₱50</p>
    <button onclick="addItem('Spring in the City',50)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>🧄 Garlic Bun</h3>
    <p>₱35</p>
    <button onclick="addItem('Garlic Bun',35)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>🥖 Hot Pandesal</h3>
    <p>₱25</p>
    <button onclick="addItem('Hot Pandesal',25)">Add to Cart</button>
  </div>

</div>

<div class="coffee-products">

  <h2>☕ Hot & Cold Coffee</h2>

  <div class="products">

    <div class="card">
      <h3>☕ Americano</h3>
      <p>₱90</p>
      <button onclick="addItem('Americano',90)">Add to Cart</button>
    </div>

    <div class="card">
      <h3>🥛 Latte</h3>
      <p>₱120</p>
      <button onclick="addItem('Latte',120)">Add to Cart</button>
    </div>

    <div class="card">
      <h3>🍫 Mocha</h3>
      <p>₱130</p>
      <button onclick="addItem('Mocha',130)">Add to Cart</button>
    </div>

    <div class="card">
      <h3>☕ Flat White</h3>
      <p>₱120</p>
      <button onclick="addItem('Flat White',120)">Add to Cart</button>
    </div>

  </div>
</section>

<div class="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: ₱<span id="total">0</span></h3>

  <div class="checkout">
    <a id="checkoutBtn" href="https://m.me/61590094065747" target="_blank">
      Checkout via Messenger
    </a>
  </div>
</div>

<script>
let cart = [];

function addItem(name, price) {
  cart.push({ name, price });
  renderCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  renderCart();
}

function renderCart() {
  let cartDiv = document.getElementById("cartItems");
  let total = 0;

  cartDiv.innerHTML = "";

  cart.forEach((item, index) => {
    total += item.price;

    cartDiv.innerHTML += `
      <div class="item">
        ${item.name} - ₱${item.price}
        <span class="remove" onclick="removeItem(${index})">✕</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;

  let message = encodeURIComponent(
    "Hello! I want to order:\n" +
    cart.map(i => "- " + i.name + " ₱" + i.price).join("\n") +
    "\nTotal: ₱" + total
  );

  document.getElementById("checkoutBtn").href =
    "https://m.me/61590094065747?text=" + message;
}
</script>

</body>
</html>
