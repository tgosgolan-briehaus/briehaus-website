<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <header class="hero-header">

  <img src="logo.png" class="logo">

  <h1>BAKE SHOP</h1>

  <p class="tagline">Freshly Baked, Made with Heart</p>

  <a href="#menu" class="hero-btn">Order Now</a>

</header>


  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F7F1E8;
      color: #5A3E2B;
    }

.card {
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
}

button:hover {
  transform: scale(1.05);
}

.products {
  padding: 40px 20px;
}

    header {
      background: #5A3E2B;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 30px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    button {
      background: #5A3E2B;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .cart {
      background: white;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      border-radius: 15px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .remove {
      color: red;
      cursor: pointer;
    }

    .checkout {
      text-align: center;
      margin-top: 20px;
    }

    .checkout a {
      background: #C79A5D;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
    }

.coffee-section {
  background: linear-gradient(135deg, #ffffff, #fff7ed);
  max-width: 1000px;
  margin: 60px auto;
  padding: 40px 20px;
  border-radius: 25px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.10);
  border-top: 4px solid #C79A5D;
}

.coffee-title {
  text-align: center;
  font-size: 30px;
  margin: 20px 0;
  position: relative;
}

/* optional nice lines on both sides */
.coffee-title::before,
.coffee-title::after {
  content: "";
  display: inline-block;
  width: 60px;
  height: 2px;
  background: #C79A5D;
  margin: 0 10px;
  vertical-align: middle;
}

.hero-header {
  background: linear-gradient(135deg, #5A3E2B, #7A5740);
  color: white;
  text-align: center;
  padding: 60px 20px;
}

.logo-wrap {
  margin-bottom: 10px;
}

.logo {
  width: 140px;
  max-width: 80%;
}

.hero-header h1 {
  font-size: 40px;
  letter-spacing: 2px;
  margin: 10px 0;
}

.tagline {
  font-size: 16px;
  opacity: 0.9;
  margin-bottom: 20px;
}

.hero-btn {
  display: inline-block;
  padding: 12px 20px;
  background: #C79A5D;
  color: white;
  text-decoration: none;
  border-radius: 25px;
  transition: 0.3s;
}

.hero-btn:hover {
  transform: scale(1.05);
}

.pickup-box {
  background: #fff;
  background: linear-gradient(135deg, #ffffff, #fff7ed);
  width: 90%;
  max-width: 500px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  margin: 50px auto;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.10);
  text-align: center;
  border-top: 3px solid #C79A5D;
}
  </style>
</head>
